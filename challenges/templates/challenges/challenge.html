<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>{{ month_name|title }} Challenge</title>
        <link rel="stylesheet" href="">
    </head>
    <body>
        <h1>{{ month_name|title }}'s Challenge</h1>

        {% endif %}
    </body>
</html>
